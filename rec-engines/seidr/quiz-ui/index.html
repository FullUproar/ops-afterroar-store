<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Tabletop Player Profile</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  h1 { font-size: 28px; line-height: 1.2; margin: 0 0 16px; color: #fff; font-weight: 700; }
  h2 { font-size: 22px; line-height: 1.3; margin: 0 0 16px; color: #fff; font-weight: 600; }
  p { margin: 0 0 14px; color: #cbd5e1; }
  small { color: #94a3b8; font-size: 13px; }
  button {
    appearance: none; border: none; cursor: pointer;
    font: inherit; line-height: 1.4;
    border-radius: 12px;
    transition: transform 0.05s, background 0.15s, border-color 0.15s;
  }
  button:active { transform: scale(0.98); }
  .btn-primary {
    background: #FF8200; color: #0a0a0a;
    padding: 14px 24px; font-size: 17px; font-weight: 700;
    width: 100%;
  }
  .btn-primary:hover { background: #ff9533; }
  .btn-secondary {
    background: transparent; color: #FF8200;
    padding: 12px 18px; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255, 130, 0, 0.4);
  }
  .btn-secondary:hover { background: rgba(255, 130, 0, 0.1); border-color: #FF8200; }
  .progress-track {
    height: 4px; background: #1f2937; border-radius: 2px;
    margin: 0 0 24px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #FF8200; transition: width 0.3s; }
  .question-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; font-size: 13px; color: #94a3b8;
  }
  .question-text {
    font-size: 22px; line-height: 1.35; font-weight: 600; color: #fff;
    margin: 8px 0 24px;
  }
  .answer {
    display: block; width: 100%; text-align: left;
    background: #1f2937; color: #e2e8f0;
    padding: 18px 20px; margin-bottom: 12px;
    border: 2px solid transparent;
    font-size: 16px; line-height: 1.4;
  }
  .answer:hover { background: #2d3748; border-color: rgba(255, 130, 0, 0.3); }
  .answer:active { background: rgba(255, 130, 0, 0.15); }
  .answer.selected { border-color: #FF8200; background: rgba(255, 130, 0, 0.1); }
  .answer-game .game-name {
    display: block; font-weight: 700; color: #FBDB65; font-size: 17px; margin-bottom: 4px;
  }
  .answer-game .game-meta { color: #94a3b8; font-size: 14px; }
  .likert-row {
    display: flex; gap: 8px;
    margin-bottom: 12px;
  }
  .likert-row .answer {
    flex: 1; text-align: center; padding: 14px 6px; font-size: 13px;
    margin-bottom: 0;
  }
  .results-narrative {
    background: rgba(255, 130, 0, 0.08);
    border-left: 3px solid #FF8200;
    padding: 18px 20px;
    border-radius: 6px;
    margin: 20px 0 28px;
  }
  .results-narrative p { color: #fff; font-size: 17px; line-height: 1.5; margin: 0; }
  .dim-row {
    margin-bottom: 14px;
    opacity: 0.95;
  }
  .dim-row.low-conf { opacity: 0.4; }
  .dim-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; font-size: 13px;
  }
  .dim-id { color: #FF8200; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; }
  .dim-conf { color: #6b7280; font-size: 11px; }
  .dim-bar-bg {
    height: 8px; background: #1f2937; border-radius: 4px;
    position: relative; overflow: hidden;
  }
  .dim-bar-center {
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 1px; background: #4b5563;
  }
  .dim-bar-fill {
    position: absolute; top: 0; bottom: 0;
    background: #FF8200;
    transition: width 0.4s, left 0.4s;
  }
  .dim-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #6b7280; margin-top: 3px;
  }
  .cluster-section { margin-bottom: 28px; }
  .cluster-title {
    font-size: 13px; font-weight: 700; color: #FBDB65; letter-spacing: 1px;
    margin: 0 0 14px; text-transform: uppercase;
  }
  .footer-note {
    margin-top: 40px; padding-top: 24px;
    border-top: 1px solid #1f2937;
    font-size: 13px; color: #94a3b8;
  }
  .footer-note p { margin-bottom: 8px; color: #94a3b8; }
  .crunching {
    text-align: center; padding: 80px 20px;
  }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid #1f2937;
    border-top-color: #FF8200;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .json-export {
    background: #0a0a0a; color: #94a3b8;
    border: 1px solid #1f2937;
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.5;
    border-radius: 6px;
    max-height: 240px; overflow: auto;
    white-space: pre;
    margin-top: 12px;
  }
  .badge {
    display: inline-block; padding: 3px 8px; font-size: 11px;
    background: rgba(255, 130, 0, 0.15); color: #FF8200;
    border-radius: 999px; font-weight: 600; letter-spacing: 0.3px;
  }
  .error {
    background: rgba(239, 68, 68, 0.1); color: #fca5a5;
    border-left: 3px solid #ef4444;
    padding: 16px; border-radius: 4px;
    font-size: 14px; margin: 20px 0;
  }
  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .question-text { font-size: 19px; }
    .answer { padding: 16px 14px; font-size: 15px; }
    .likert-row { flex-direction: column; gap: 6px; }
    .likert-row .answer { padding: 12px; font-size: 14px; }
  }
</style>
</head>
<body>
<main id="app">
  <div class="crunching">
    <div class="spinner"></div>
    <p style="margin-top: 16px;">Loading…</p>
  </div>
</main>

<script>
(async function () {
  'use strict';

  const TARGET_QUESTIONS = 18;

  const app = document.getElementById('app');
  let bank, dims;
  let sampled = [];
  let currentIdx = 0;
  let responses = [];

  // -------------------- LOAD DATA --------------------
  try {
    [bank, dims] = await Promise.all([
      fetch('./question-bank.json').then(r => r.json()),
      fetch('./dimensions.json').then(r => r.json()),
    ]);
  } catch (err) {
    app.innerHTML = `<h1>Couldn’t load quiz data</h1>
      <p>This page needs <code>question-bank.json</code> and <code>dimensions.json</code> next to <code>index.html</code>.</p>
      <div class="error">${err.message}</div>
      <p>If you’re opening the file directly (file://), some browsers block local fetches. Try running:</p>
      <p><code>python3 -m http.server 8080</code></p>
      <p>then visit http://localhost:8080</p>`;
    return;
  }

  // -------------------- SAMPLING --------------------
  function sampleQuestions() {
    const all = [...bank.questions];
    const picked = new Set();

    function pick(arr, n) {
      const shuffled = arr.slice().sort(() => Math.random() - 0.5);
      let added = 0;
      for (const q of shuffled) {
        if (added >= n) break;
        if (!picked.has(q.id)) {
          picked.add(q.id);
          added++;
        }
      }
    }

    // Phase 1: each cluster hit at least 2 times
    const clusters = ['PSY', 'SOC', 'MEC', 'AES', 'CTX', 'EMO'];
    for (const cluster of clusters) {
      const candidates = all.filter(q =>
        q.answers.some(a =>
          Object.keys(a.weights || {}).some(k => k.startsWith(cluster + '_'))
        )
      );
      pick(candidates, 2);
    }

    // Phase 2: format minimums
    const formatMin = (bank.sampling_rules && bank.sampling_rules.format_minimums) || {
      game_vs_game: 1, this_or_that: 2, likert: 2, multiple_choice: 1
    };
    for (const [fmt, n] of Object.entries(formatMin)) {
      const have = [...picked].filter(id => all.find(q => q.id === id).type === fmt).length;
      const need = Math.max(0, n - have);
      if (need > 0) {
        const candidates = all.filter(q => q.type === fmt);
        pick(candidates, need);
      }
    }

    // Phase 3: fill to target
    pick(all, TARGET_QUESTIONS - picked.size);

    // Return shuffled (for variety in presentation order)
    return [...picked].map(id => all.find(q => q.id === id))
      .sort(() => Math.random() - 0.5);
  }

  // -------------------- SCORING --------------------
  function computeProfile() {
    const V = {}, C = {}, N = {};
    for (const d of dims.dimensions) {
      V[d.id] = 0; C[d.id] = 0; N[d.id] = 0;
    }
    for (const resp of responses) {
      const weights = resp.answer.weights || {};
      for (const [dim, w] of Object.entries(weights)) {
        if (V[dim] === undefined) continue;
        V[dim] += w;
        C[dim] += Math.abs(w);
        N[dim] += 1;
      }
    }
    const profile = {}, confidence = {};
    for (const d of dims.dimensions) {
      profile[d.id] = V[d.id] / Math.max(1, C[d.id]);
      confidence[d.id] = Math.min(1, N[d.id] / 3);
    }
    return { profile, confidence, raw_v: V, count: N };
  }

  function generateNarrative(profile, confidence) {
    const scored = dims.dimensions.map(d => ({
      d,
      score: profile[d.id],
      conf: confidence[d.id],
      salience: Math.abs(profile[d.id]) * confidence[d.id],
    })).filter(x => x.salience > 0.15);

    scored.sort((a, b) => b.salience - a.salience);
    const top = scored.slice(0, 5);

    if (top.length === 0) {
      return 'Your profile came back fairly neutral — you didn’t lean strongly in any one direction. That’s a real result, not a failure: it suggests you’re flexible across game types.';
    }

    const phrases = top.map(({ d, score }) => (score > 0 ? d.high : d.low).toLowerCase());
    const top3 = phrases.slice(0, 3);
    const next2 = phrases.slice(3, 5);

    let narrative = `You lean ${top3.join(', ')}`;
    if (next2.length > 0) {
      narrative += `, with notes of ${next2.join(' and ')}`;
    }
    narrative += '.';
    return narrative;
  }

  // -------------------- RENDERING --------------------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderIntro() {
    app.innerHTML = `
      <span class="badge">Research preview</span>
      <h1 style="margin-top: 14px;">What kind of tabletop player are you?</h1>
      <p>About 18 quick questions — “this-or-that”, agree/disagree, and a few “which game tonight?” picks.</p>
      <p>You’ll get back a 24-dimension profile of your gaming preferences. Takes ~5 minutes.</p>
      <p style="margin-bottom: 28px;"><small>Nothing leaves your device. The result is yours; you can copy or download it. This is a research instrument; recommendations come in a future version.</small></p>
      <button class="btn-primary" onclick="window.__begin()">Begin</button>
    `;
  }

  window.__begin = () => {
    sampled = sampleQuestions();
    currentIdx = 0;
    responses = [];
    renderQuestion();
  };

  function renderQuestion() {
    const q = sampled[currentIdx];
    const pct = Math.round(((currentIdx) / sampled.length) * 100);

    let answersHtml = '';
    if (q.type === 'likert') {
      const items = q.answers.map((a, i) => `
        <button class="answer" onclick="window.__answer(${i})">${escapeHtml(a.text)}</button>
      `).join('');
      answersHtml = items;
    } else if (q.type === 'game_vs_game') {
      answersHtml = q.answers.map((a, i) => {
        const lines = a.text.split(' — ');
        const name = lines[0];
        const meta = lines.slice(1).join(' — ');
        return `<button class="answer answer-game" onclick="window.__answer(${i})">
          <span class="game-name">${escapeHtml(name)}</span>
          <span class="game-meta">${escapeHtml(meta)}</span>
        </button>`;
      }).join('');
    } else {
      // this_or_that or multiple_choice
      answersHtml = q.answers.map((a, i) => `
        <button class="answer" onclick="window.__answer(${i})">${escapeHtml(a.text)}</button>
      `).join('');
    }

    app.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width: ${pct}%"></div></div>
      <div class="question-meta">
        <span>Question ${currentIdx + 1} of ${sampled.length}</span>
        <span>${escapeHtml(q.type.replace(/_/g, ' '))}</span>
      </div>
      <p class="question-text">${escapeHtml(q.text)}</p>
      ${answersHtml}
    `;
    window.scrollTo(0, 0);
  }

  window.__answer = (answerIdx) => {
    const q = sampled[currentIdx];
    const answer = q.answers[answerIdx];
    responses.push({
      questionId: q.id,
      questionType: q.type,
      answerIndex: answerIdx,
      answer: answer,
    });
    currentIdx++;
    if (currentIdx >= sampled.length) {
      renderCrunching();
    } else {
      renderQuestion();
    }
  };

  function renderCrunching() {
    app.innerHTML = `
      <div class="crunching">
        <div class="spinner"></div>
        <p style="margin-top: 16px;">Computing your profile…</p>
      </div>
    `;
    setTimeout(renderResults, 700);
  }

  function renderResults() {
    const { profile, confidence, count } = computeProfile();
    const narrative = generateNarrative(profile, confidence);

    // Group dimensions by cluster
    const byCluster = {};
    for (const d of dims.dimensions) {
      if (!byCluster[d.cluster]) byCluster[d.cluster] = [];
      byCluster[d.cluster].push(d);
    }

    const clusterOrder = ['PSY', 'SOC', 'MEC', 'AES', 'CTX', 'EMO'];
    const clusterNames = (dims.clusters || {});

    let clustersHtml = '';
    for (const ck of clusterOrder) {
      if (!byCluster[ck]) continue;
      const rows = byCluster[ck].map(d => {
        const v = profile[d.id];
        const conf = confidence[d.id];
        const lowConf = conf < 0.34;
        // bar: -1.0 to +1.0 mapped to 0..100% with 50% center
        const pct = (v + 1) * 50; // 0..100
        const fillLeft = Math.min(50, pct);
        const fillWidth = Math.abs(pct - 50);
        return `<div class="dim-row${lowConf ? ' low-conf' : ''}">
          <div class="dim-header">
            <span class="dim-id">${escapeHtml(d.id)}</span>
            <span class="dim-conf">conf ${(conf * 100).toFixed(0)}% · ${count[d.id]}q</span>
          </div>
          <div class="dim-bar-bg">
            <div class="dim-bar-center"></div>
            <div class="dim-bar-fill" style="left: ${fillLeft}%; width: ${fillWidth}%;"></div>
          </div>
          <div class="dim-labels">
            <span>${escapeHtml(d.low)}</span>
            <span>${escapeHtml(d.high)}</span>
          </div>
        </div>`;
      }).join('');
      clustersHtml += `<section class="cluster-section">
        <h3 class="cluster-title">${escapeHtml(clusterNames[ck] || ck)}</h3>
        ${rows}
      </section>`;
    }

    const exportData = {
      meta: {
        bank_version: bank.metadata?.version,
        questions_answered: responses.length,
        timestamp: new Date().toISOString(),
      },
      profile,
      confidence,
      raw: responses.map(r => ({
        question_id: r.questionId,
        question_type: r.questionType,
        answer_index: r.answerIndex,
        answer_text: r.answer.text,
      })),
    };
    const exportJson = JSON.stringify(exportData, null, 2);

    app.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width: 100%"></div></div>
      <h1>Your tabletop profile</h1>
      <div class="results-narrative"><p>${escapeHtml(narrative)}</p></div>
      <p style="margin-bottom: 24px;"><small>The bars show where you sit on each dimension. Bars at low opacity got fewer questions — take the quiz again for sharper signal there.</small></p>
      ${clustersHtml}
      <div class="footer-note">
        <p><strong>Profile JSON</strong> — your data, no server side. Copy or save.</p>
        <pre class="json-export" id="json-out">${escapeHtml(exportJson)}</pre>
        <p style="margin-top: 14px;"><button class="btn-secondary" onclick="window.__copy()">Copy JSON</button>
          <button class="btn-secondary" onclick="window.__download()" style="margin-left: 8px;">Download</button>
          <button class="btn-secondary" onclick="window.__retake()" style="margin-left: 8px;">Retake</button></p>
        <p style="margin-top: 24px;"><small>This is a research instrument from the Mimir engineering team. Recommendations — based on this profile + a separate game-profiling pipeline — come in a future release. If you have feedback on which questions felt off or missing, please share.</small></p>
      </div>
    `;
    window.__exportJson = exportJson;
  }

  window.__copy = async () => {
    try {
      await navigator.clipboard.writeText(window.__exportJson);
      alert('Copied!');
    } catch (e) {
      alert('Copy failed. You can select the JSON manually.');
    }
  };
  window.__download = () => {
    const blob = new Blob([window.__exportJson], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tabletop-profile-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  window.__retake = () => { renderIntro(); };

  renderIntro();
})();
</script>
</body>
</html>
